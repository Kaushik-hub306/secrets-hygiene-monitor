<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Secrets Hygiene Monitor</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="{{ url_for('static', path='/css/app.css') }}">
</head>
<body>
<main class="page connect-page active">
  <section class="connect-card" aria-labelledby="connect-title">
    <div class="logo-row">
      <div class="logo-icon" aria-hidden="true">
        <svg viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
      </div>
      <span class="logo-text">secrets-hygiene-monitor</span>
    </div>

    <h1 id="connect-title">Connect your repos</h1>
    <p class="sub">Link GitHub to start monitoring repositories for leaked credentials.</p>

    <div class="field">
      <label for="gh-org">GitHub Org / Username</label>
      <input type="text" placeholder="Kaushik-hub306" id="gh-org" autocomplete="username">
    </div>

    <div class="field">
      <label for="aws-region">AWS Region</label>
      <input type="text" placeholder="us-east-1" id="aws-region" autocomplete="off">
    </div>

    <button class="connect-btn" id="connect-gh-btn" type="button">
      Connect GitHub
    </button>

    <div class="divider">or</div>

    <button class="discord-btn" id="connect-discord-btn" type="button">
      <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M20.317 4.492c-1.53-.69-3.17-1.2-4.885-1.49a.075.075 0 0 0-.079.036c-.21.369-.444.85-.608 1.23a18.566 18.566 0 0 0-5.487 0 12.36 12.36 0 0 0-.617-1.23A.077.077 0 0 0 8.562 3c-1.714.29-3.354.8-4.885 1.491a.07.07 0 0 0-.032.027C.533 9.093-.32 13.555.099 17.961a.08.08 0 0 0 .031.055 20.03 20.03 0 0 0 5.993 2.98.078.078 0 0 0 .084-.026c.462-.62.874-1.275 1.226-1.963.021-.04.001-.088-.041-.104a13.201 13.201 0 0 1-1.872-.878.075.075 0 0 1-.008-.125c.126-.093.252-.19.372-.287a.075.075 0 0 1 .078-.01c3.927 1.764 8.18 1.764 12.061 0a.075.075 0 0 1 .079.009c.12.098.245.195.372.288a.075.075 0 0 1-.006.125c-.598.344-1.22.635-1.873.877a.075.075 0 0 0-.041.105c.36.687.772 1.341 1.225 1.962a.077.077 0 0 0 .084.028 19.963 19.963 0 0 0 6.002-2.981.076.076 0 0 0 .032-.054c.5-5.094-.838-9.52-3.549-13.442a.06.06 0 0 0-.031-.028z"></path></svg>
      Connect Discord Alerts
    </button>

    <div class="status-wrap">
      <span class="status-tag ok">
        <span class="pulse"></span>
        System operational
      </span>
    </div>
  </section>
</main>

<div class="toast-container" id="toast-container"></div>
<script>
document.getElementById("connect-gh-btn").addEventListener("click", function () {
  this.textContent = "Connecting...";
  this.disabled = true;
  window.location.href = "/auth/github";
});

document.getElementById("connect-discord-btn").addEventListener("click", function () {
  this.textContent = "Connect GitHub first, then add Discord alerts per repo";
  this.classList.add("is-muted");
});
</script>
</body>
</html>
