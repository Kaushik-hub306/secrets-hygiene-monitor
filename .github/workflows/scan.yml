name: Daily Secrets Scan
on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:
jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Run scanner
        run: |
          pip install -r requirements.txt
          python src/scanner.py --dir . --json > scan-results.json
